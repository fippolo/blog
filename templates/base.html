<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ settings.site_title }}{% endblock %}</title>
    <meta name="description" content="{{ site_description_text }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <header class="site-header">
      {% block site_header %}
        <div class="shell">
          <a class="site-title" href="{{ url_for('index') }}">{{ settings.site_title }}</a>
          <div class="site-description">{{ site_description_html }}</div>
        </div>
      {% endblock %}
    </header>
    <main class="shell">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
