services:
  nginx:
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/ssl.conf.template:/etc/nginx/templates/ssl.conf.template:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    environment:
      DOMAIN: ${DOMAIN}

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"

volumes:
  certbot_www:
  letsencrypt:
